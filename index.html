<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="main">
        
        <div class="card">
            <input type="text" placeholder="Enter the city name" spellcheck="false" class="search">
            <button class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
           
        </div>
         <div class="error">
                <p>Invalid city name!</p>
            </div>

        <div class="weather">
            <div class="weather-icon">
                <img src="/images/cloudy.png" class="main-icon" alt="weather icon">
                <h1 class="temp">22°C</h1>
                <h3 class="city">America</h3>
            </div>
        </div>

        <div class="images">
            <div class="hum">
                <img src="/images/humidity.png" class="small-icon" alt="humidity icon">
                <div class="inside">
                    <h1 class="per">64%</h1>
                    <p class="para">HUMIDITY</p>
                </div>
            </div>

            <div class="rainfall">
                <img src="/images/windspeed.png" class="small-icon" alt="wind icon">
                <div class="inside">
                    <h1 class="km">18 km/ph</h1>
                    <p class="para">Wind Speed</p>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
